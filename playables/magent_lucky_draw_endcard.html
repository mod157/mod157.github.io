<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="ad.size" content="width=320,height=480" />
  <title>Magent Lucky Draw End Card</title>
  <style>
:root {
  --bg-1: #2a0d4d;
  --bg-2: #560a52;
  --bg-3: #1a052e;
  --accent: #fbbf24;
  --accent-2: #ec4899;
  --text: #ffffff;
  --muted: rgba(255, 255, 255, 0.78);
  --card-w: min(28vw, 110px);
  --card-h: calc(var(--card-w) * 1.5);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; min-height: 100%; background: #0a0218; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif; }
body { display: grid; place-items: center; overflow: hidden; color: var(--text); }
button { font: inherit; }

.endcard {
  position: relative;
  width: min(100vw, 430px);
  height: min(100vh, 760px);
  min-height: 560px;
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 8%, rgba(251, 191, 36, 0.24), transparent 28%),
    radial-gradient(circle at 82% 12%, rgba(236, 72, 153, 0.20), transparent 26%),
    radial-gradient(circle at 50% 100%, rgba(26, 5, 46, 0.7), transparent 50%),
    linear-gradient(160deg, var(--bg-1), var(--bg-2) 70%, var(--bg-3));
  isolation: isolate;
  user-select: none;
  touch-action: none;
}

.endcard::before,
.endcard::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  filter: blur(2px);
  pointer-events: none;
  opacity: 0.84;
}
.endcard::before {
  width: 220px; height: 220px; right: -90px; top: 120px;
  background: rgba(251, 191, 36, 0.16);
}
.endcard::after {
  width: 200px; height: 200px; left: -90px; bottom: 60px;
  background: rgba(236, 72, 153, 0.14);
}

.sparkle-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.sparkle-bg span {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 0 8px 2px rgba(251, 191, 36, 0.55);
  animation: sparkle 2400ms ease-in-out infinite;
}
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0.6); }
  40%, 60% { opacity: 1; transform: scale(1.2); }
}

.close-btn {
  position: absolute;
  top: 12px; right: 12px;
  width: 32px; height: 32px;
  border: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.16);
  color: rgba(255, 255, 255, 0.95);
  z-index: 30;
  cursor: pointer;
}

.hero-copy {
  position: relative;
  z-index: 2;
  padding: 28px 22px 14px;
  text-align: center;
}

.brand-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 24px;
  padding: 0 10px;
  border: 1px solid rgba(255, 255, 255, 0.30);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.14);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.hero-copy h1 {
  margin: 12px 0 6px;
  font-size: clamp(23px, 6.2vw, 30px);
  line-height: 1.12;
  letter-spacing: -0.04em;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.32);
}
.hero-copy p {
  margin: 0 auto;
  max-width: 320px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.45;
  word-break: keep-all;
}

.card-stage {
  position: relative;
  z-index: 2;
  margin: 22px 18px 0;
  height: calc(var(--card-h) + 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  perspective: 1200px;
}

.lucky-card {
  position: relative;
  width: var(--card-w);
  height: var(--card-h);
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 700ms cubic-bezier(0.4, 0.0, 0.2, 1), opacity 360ms ease, filter 360ms ease;
  animation: cardFloat 2800ms ease-in-out infinite;
}
.lucky-card:nth-child(1) { animation-delay: 0ms; }
.lucky-card:nth-child(2) { animation-delay: -900ms; }
.lucky-card:nth-child(3) { animation-delay: -1800ms; }
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotateY(0); }
  50% { transform: translateY(-6px) rotateY(0); }
}
.lucky-card.faded { opacity: 0.18; filter: grayscale(0.7) blur(1px); pointer-events: none; animation: none; }
.lucky-card.flipped { transform: rotateY(180deg) scale(1.08); animation: none; z-index: 3; }
.lucky-card.flipped .lucky-card-back { animation: glowReveal 700ms ease 300ms both; }

@keyframes glowReveal {
  0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
  60% { box-shadow: 0 0 28px 8px rgba(251, 191, 36, 0.62); }
  100% { box-shadow: 0 18px 38px rgba(0, 0, 0, 0.5), 0 0 12px rgba(251, 191, 36, 0.32); }
}

.lucky-card-face,
.lucky-card-back {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  box-shadow: 0 18px 38px rgba(0, 0, 0, 0.42);
  border: 2px solid rgba(251, 191, 36, 0.55);
  overflow: hidden;
}

.lucky-card-face {
  background:
    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.10) 0%, transparent 50%),
    linear-gradient(135deg, #2a0d4d 0%, #6b1f72 50%, #2a0d4d 100%);
  transform: rotateY(0);
  display: grid;
  place-items: center;
}
.lucky-card-face::before {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 12px;
  border: 1px dashed rgba(251, 191, 36, 0.42);
}
.lucky-card-face .symbol {
  font-size: 38px;
  filter: drop-shadow(0 4px 10px rgba(251, 191, 36, 0.42));
}
.lucky-card-face .number {
  position: absolute;
  top: 8px; left: 8px;
  font-size: 12px;
  font-weight: 900;
  color: rgba(251, 191, 36, 0.92);
  letter-spacing: 0.02em;
}
.lucky-card-face .number-bottom {
  position: absolute;
  bottom: 8px; right: 8px;
  font-size: 12px;
  font-weight: 900;
  color: rgba(251, 191, 36, 0.92);
  transform: rotate(180deg);
}

.lucky-card-back {
  background:
    radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.30), transparent 50%),
    linear-gradient(160deg, #fef3c7 0%, #fde68a 60%, #fbbf24 100%);
  color: #4a3220;
  transform: rotateY(180deg);
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 12px 8px 10px;
  text-align: center;
}
.lucky-card-back .reward-icon {
  font-size: 40px;
  align-self: center;
  filter: drop-shadow(0 4px 12px rgba(251, 113, 133, 0.45));
}
.lucky-card-back .reward-label {
  font-size: 11px;
  color: #92400e;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.lucky-card-back .reward-text {
  font-size: 14px;
  color: #4a3220;
  font-weight: 900;
  line-height: 1.2;
  word-break: keep-all;
}

.hint-row {
  position: relative;
  z-index: 2;
  margin-top: 18px;
  text-align: center;
}
.hint-text {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.10);
  border: 1px solid rgba(255, 255, 255, 0.18);
  color: rgba(255, 255, 255, 0.92);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.02em;
  animation: hintPulse 1800ms ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
.hint-text.hidden { display: none; }

.bottom-cta {
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: 18px;
  z-index: 4;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 400ms ease, transform 400ms cubic-bezier(0.2, 0.7, 0.3, 1.0);
  pointer-events: none;
}
.bottom-cta.is-visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.bottom-cta-message {
  margin: 0 auto 12px;
  max-width: 320px;
  text-align: center;
}
.bottom-cta-message strong {
  display: block;
  font-size: 18px;
  color: #fff;
  margin-bottom: 4px;
}
.bottom-cta-message span {
  display: block;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.78);
  word-break: keep-all;
}
.cta-button, .replay-button {
  width: 100%;
  border: 0;
  border-radius: 18px;
  cursor: pointer;
}
.cta-button {
  height: 54px;
  color: #fff;
  font-size: 17px;
  font-weight: 900;
  background: linear-gradient(135deg, #fbbf24, #ec4899);
  box-shadow: 0 18px 32px rgba(236, 72, 153, 0.42);
}
.replay-button {
  height: 38px;
  margin-top: 8px;
  color: rgba(255, 255, 255, 0.82);
  background: rgba(255, 255, 255, 0.12);
  font-size: 12px;
  font-weight: 800;
}

.confetti {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}
.confetti span {
  position: absolute;
  width: 8px;
  height: 14px;
  top: -20px;
  border-radius: 2px;
  animation: confettiFall 1600ms ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0); opacity: 1; }
  100% { transform: translateY(720px) rotate(540deg); opacity: 0.4; }
}

@media (max-height: 650px) {
  :root { --card-w: min(24vw, 90px); --card-h: calc(var(--card-w) * 1.5); }
  .hero-copy { padding: 18px 22px 8px; }
  .hero-copy h1 { font-size: 22px; }
  .hero-copy p { font-size: 12px; }
  .lucky-card-face .symbol { font-size: 30px; }
  .lucky-card-back .reward-icon { font-size: 32px; }
  .lucky-card-back .reward-text { font-size: 12px; }
  .card-stage { margin-top: 12px; }
  .bottom-cta { bottom: 12px; }
  .cta-button { height: 48px; font-size: 16px; }
}

</style>
</head>
<body>
  <main class="endcard" id="endcard" aria-label="행운 카드 뽑기 엔드 카드">
    <div class="sparkle-bg" id="sparkleBg" aria-hidden="true"></div>
    <button class="close-btn" type="button" aria-label="닫기">×</button>

    <section class="hero-copy" aria-live="polite">
      <div class="brand-pill">MAGENT END CARD</div>
      <h1 id="headline">오늘의 행운 카드를 골라보세요</h1>
      <p id="subheadline">한 장만 골라서 뒤집어 보세요. 어떤 보상이 기다리고 있을까요?</p>
    </section>

    <section class="card-stage" id="cardStage" aria-label="행운 카드 3장"></section>

    <div class="hint-row">
      <span class="hint-text" id="hint">👆 카드를 한 장 골라 보세요</span>
    </div>

    <div class="bottom-cta" id="bottomCta" aria-hidden="true">
      <div class="bottom-cta-message">
        <strong id="ctaTitle">대박! 보상 당첨</strong>
        <span id="ctaSub">지금 시작하고 즉시 받아가세요.</span>
      </div>
      <button id="ctaButton" class="cta-button" type="button">지금 받으러 가기</button>
      <button id="replayButton" class="replay-button" type="button">다시 뽑기</button>
    </div>
  </main>

  <script>
(function () {
  'use strict';

  var CONFIG = {
    landingUrl: 'https://example.com',
    headline: '오늘의 행운 카드를 골라보세요',
    subheadline: '한 장만 골라서 뒤집어 보세요. 어떤 보상이 기다리고 있을까요?',
    hint: '👆 카드를 한 장 골라 보세요',
    ctaText: '지금 받으러 가기',
    replayText: '다시 뽑기',
    confettiOnReveal: true,
    cards: [
      {
        id: 'gold',
        number: '07',
        symbol: '🍀',
        rewardIcon: '🪙',
        rewardLabel: 'GOLD',
        rewardText: '10,000 골드 획득!',
        ctaTitle: '대박! 골드 보상 당첨',
        ctaSub: '게임을 시작하면 즉시 지급됩니다.'
      },
      {
        id: 'gem',
        number: '13',
        symbol: '💠',
        rewardIcon: '💎',
        rewardLabel: 'JACKPOT',
        rewardText: '다이아 100개 획득!',
        ctaTitle: '최고급 다이아 100개 당첨',
        ctaSub: '지금 시작하고 즉시 받아가세요.'
      },
      {
        id: 'hero',
        number: '21',
        symbol: '⭐',
        rewardIcon: '⚔️',
        rewardLabel: 'LEGEND',
        rewardText: '전설 캐릭터 카드!',
        ctaTitle: '전설 등급 캐릭터 등장!',
        ctaSub: '함께 모험을 시작해보세요.'
      }
    ]
  };

  var state = {
    picked: false,
    pickedCardId: null
  };

  var els = {};

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    els.endcard = document.getElementById('endcard');
    els.headline = document.getElementById('headline');
    els.subheadline = document.getElementById('subheadline');
    els.cardStage = document.getElementById('cardStage');
    els.hint = document.getElementById('hint');
    els.bottomCta = document.getElementById('bottomCta');
    els.ctaTitle = document.getElementById('ctaTitle');
    els.ctaSub = document.getElementById('ctaSub');
    els.ctaButton = document.getElementById('ctaButton');
    els.replayButton = document.getElementById('replayButton');

    els.headline.textContent = CONFIG.headline;
    els.subheadline.textContent = CONFIG.subheadline;
    els.hint.textContent = CONFIG.hint;
    els.ctaButton.textContent = CONFIG.ctaText;
    els.replayButton.textContent = CONFIG.replayText;

    buildSparkles();
    buildCards();

    els.ctaButton.addEventListener('click', function () {
      track('cta_click', { card: state.pickedCardId });
      openLanding();
    });
    els.replayButton.addEventListener('click', resetCards);

    var close = document.querySelector('.close-btn');
    if (close) {
      close.addEventListener('click', function () {
        track('close_click');
        openLanding();
      });
    }

    track('creative_view');
  }

  function buildSparkles() {
    var bg = document.getElementById('sparkleBg');
    if (!bg) return;
    for (var i = 0; i < 22; i++) {
      var s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 2400 + 'ms';
      s.style.animationDuration = (1600 + Math.random() * 1600) + 'ms';
      bg.appendChild(s);
    }
  }

  function buildCards() {
    els.cardStage.innerHTML = '';
    CONFIG.cards.forEach(function (card, idx) {
      var el = document.createElement('div');
      el.className = 'lucky-card';
      el.dataset.cardId = card.id;
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', '행운 카드 ' + (idx + 1));

      var face = document.createElement('div');
      face.className = 'lucky-card-face';
      face.innerHTML =
        '<div class="number">' + card.number + '</div>' +
        '<div class="symbol">' + card.symbol + '</div>' +
        '<div class="number-bottom">' + card.number + '</div>';

      var back = document.createElement('div');
      back.className = 'lucky-card-back';
      back.innerHTML =
        '<div class="reward-label">' + card.rewardLabel + '</div>' +
        '<div class="reward-icon">' + card.rewardIcon + '</div>' +
        '<div class="reward-text">' + card.rewardText + '</div>';

      el.appendChild(face);
      el.appendChild(back);
      el.addEventListener('click', function () { onCardClick(card, el); });
      els.cardStage.appendChild(el);
    });
  }

  function onCardClick(card, el) {
    if (state.picked) return;
    state.picked = true;
    state.pickedCardId = card.id;
    track('first_interaction', { card: card.id });
    track('card_pick', { card: card.id });

    var allCards = els.cardStage.querySelectorAll('.lucky-card');
    allCards.forEach(function (other) {
      if (other === el) {
        other.classList.add('flipped');
      } else {
        other.classList.add('faded');
      }
    });

    els.hint.classList.add('hidden');

    setTimeout(function () {
      els.ctaTitle.textContent = card.ctaTitle;
      els.ctaSub.textContent = card.ctaSub;
      els.bottomCta.classList.add('is-visible');
      if (CONFIG.confettiOnReveal) launchConfetti();
      track('reveal_complete', { card: card.id });
    }, 760);
  }

  function launchConfetti() {
    var container = document.createElement('div');
    container.className = 'confetti';
    var colors = ['#fbbf24', '#ec4899', '#22d3ee', '#a78bfa', '#34d399', '#f97316'];
    for (var i = 0; i < 40; i++) {
      var s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.animationDelay = (Math.random() * 600) + 'ms';
      s.style.animationDuration = (1300 + Math.random() * 800) + 'ms';
      container.appendChild(s);
    }
    els.endcard.appendChild(container);
    setTimeout(function () { if (container.parentNode) container.parentNode.removeChild(container); }, 2500);
  }

  function resetCards() {
    state.picked = false;
    state.pickedCardId = null;
    var allCards = els.cardStage.querySelectorAll('.lucky-card');
    allCards.forEach(function (c) {
      c.classList.remove('flipped', 'faded');
    });
    els.bottomCta.classList.remove('is-visible');
    els.hint.classList.remove('hidden');
    track('replay_click');
  }

  function getLandingUrl() {
    var params = new URLSearchParams(window.location.search);
    return params.get('clickTag') || params.get('clickTAG') || params.get('landing') || window.clickTag || window.clickTAG || CONFIG.landingUrl;
  }

  function openLanding() {
    var url = getLandingUrl();
    if (!url) return;
    try {
      if (window.mraid && typeof window.mraid.open === 'function') {
        window.mraid.open(url);
      } else {
        window.open(url, '_blank');
      }
    } catch (e) {
      window.location.href = url;
    }
  }

  function track(eventName, payload) {
    var detail = payload || {};
    window.dispatchEvent(new CustomEvent('magentPlayableEvent', {
      detail: { name: eventName, payload: detail, ts: Date.now() }
    }));
    if (window.MAGENT_DEBUG) console.log('[MagentLuckyDraw]', eventName, detail);
  }
})();

</script>
</body>
</html>
