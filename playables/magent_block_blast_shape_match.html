<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="ad.size" content="width=320,height=480" />
  <title>Block Blast Playable</title>
  <style>
:root {
  --bg-1: #ee5d8a;
  --bg-2: #d6376b;
  --bg-dot: rgba(255, 255, 255, 0.12);
  --board-bg-1: #161a30;
  --board-bg-2: #232851;
  --board-cell: rgba(255, 255, 255, 0.04);
  --board-line: rgba(255, 255, 255, 0.06);
  --target-line: rgba(255, 255, 255, 0.36);
  --target-fill: rgba(0, 0, 0, 0.18);
  --install: #2cc46a;
  --install-hi: #41dc81;
  --text: #ffffff;
  --piece-1-a: #7be0ff; --piece-1-b: #3886ff;
  --piece-2-a: #ffd64a; --piece-2-b: #ff7a1a;
  --piece-3-a: #ba8cff; --piece-3-b: #6c5cff;
  --piece-4-a: #6cf3a9; --piece-4-b: #18a85f;
  --board-size: min(80vw, 280px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; min-height: 100%; background: #b32958; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif; }
body { display: grid; place-items: center; overflow: hidden; color: var(--text); }
button { font: inherit; }

.playable {
  position: relative;
  width: min(100vw, 420px);
  height: min(100vh, 720px);
  min-height: 540px;
  overflow: hidden;
  background:
    radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.20), transparent 26%),
    radial-gradient(circle at 88% 0%, rgba(255, 199, 220, 0.34), transparent 32%),
    radial-gradient(circle at 50% 110%, rgba(176, 36, 86, 0.55), transparent 50%),
    linear-gradient(170deg, var(--bg-1), var(--bg-2));
  isolation: isolate;
  user-select: none;
  touch-action: none;
}

.playable::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(var(--bg-dot) 1.2px, transparent 1.4px);
  background-size: 18px 18px;
  opacity: 0.35;
  pointer-events: none;
  z-index: 0;
}

.icon-btn {
  position: absolute;
  top: 12px;
  width: 30px; height: 30px;
  border: 0;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.22);
  color: rgba(255, 255, 255, 0.92);
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
  z-index: 30;
}
.close-btn { left: 12px; font-size: 22px; }
.skip-btn { right: 12px; }

.top-bar {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 12px;
  padding: 50px 18px 12px;
}

.logo {
  display: inline-flex;
  flex-direction: column;
  gap: 2px;
  transform: rotate(-4deg);
  filter: drop-shadow(0 4px 0 rgba(0, 0, 0, 0.18)) drop-shadow(0 8px 16px rgba(0, 0, 0, 0.25));
}
.logo-row {
  display: inline-flex;
  gap: 1px;
}
.logo-row-2 { margin-left: 16px; }
.logo-char {
  display: inline-block;
  font-family: "Arial Black", "Black Han Sans", Impact, sans-serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -0.01em;
  line-height: 0.9;
  color: #fff;
  -webkit-text-stroke: 2px #1a1a3a;
  text-stroke: 2px #1a1a3a;
  text-shadow:
    0 2px 0 #1a1a3a,
    0 3px 0 #1a1a3a;
  background-clip: text;
}
.logo-char.c1 { color: #ff5d7a; transform: rotate(-3deg); }
.logo-char.c2 { color: #ffd152; transform: rotate(2deg); }
.logo-char.c3 { color: #7ee7ff; transform: rotate(-1deg); }
.logo-char.c4 { color: #b08cff; transform: rotate(3deg); }
.logo-char.c5 { color: #ff8d5d; transform: rotate(-2deg); }
.logo-char.c6 { color: #6cf3a9; transform: rotate(2deg); }
.logo-char.c7 { color: #ff5d7a; transform: rotate(-2deg); }
.logo-char.c8 { color: #ffd152; transform: rotate(3deg); }
.logo-char.c9 { color: #7ee7ff; transform: rotate(-3deg); }
.logo-char.c10 { color: #b08cff; transform: rotate(1deg); }

.score-block {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.score-num {
  font-family: "Arial Black", Impact, sans-serif;
  font-size: 30px;
  font-weight: 900;
  line-height: 1;
  color: #fff;
  text-shadow: 0 2px 0 rgba(0, 0, 0, 0.25), 0 4px 14px rgba(0, 0, 0, 0.22);
  letter-spacing: -0.02em;
}
.install-pill {
  height: 26px;
  padding: 0 14px;
  border: 0;
  border-radius: 999px;
  background: linear-gradient(180deg, var(--install-hi), var(--install));
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 0 rgba(0, 0, 0, 0.20), 0 6px 14px rgba(44, 196, 106, 0.40);
  cursor: pointer;
}
.install-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, 0.20); }

.game-area {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 6px 16px 18px;
}

.board-wrap {
  position: relative;
  display: grid;
  place-items: center;
}

.board {
  position: relative;
  width: var(--board-size);
  height: var(--board-size);
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 2px;
  padding: 8px;
  border-radius: 14px;
  background: linear-gradient(180deg, var(--board-bg-1), var(--board-bg-2));
  border: 2px solid rgba(0, 0, 0, 0.28);
  box-shadow:
    inset 0 2px 0 rgba(255, 255, 255, 0.06),
    inset 0 -2px 0 rgba(0, 0, 0, 0.30),
    0 12px 24px rgba(0, 0, 0, 0.30);
}

.board-cell {
  position: relative;
  border-radius: 4px;
  background: var(--board-cell);
  border: 1px solid var(--board-line);
}

.board-cell.target {
  background: var(--target-fill);
  border: 1.5px dashed var(--target-line);
}
.board-cell.target.hover {
  border-color: rgba(124, 224, 255, 0.95);
  background: rgba(124, 224, 255, 0.18);
}
.board-cell.filled {
  border-color: rgba(0, 0, 0, 0.32);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.30),
    inset 0 -2px 0 rgba(0, 0, 0, 0.22),
    0 2px 4px rgba(0, 0, 0, 0.15);
}
.board-cell.piece-1 { background: linear-gradient(180deg, var(--piece-1-a), var(--piece-1-b)); }
.board-cell.piece-2 { background: linear-gradient(180deg, var(--piece-2-a), var(--piece-2-b)); }
.board-cell.piece-3 { background: linear-gradient(180deg, var(--piece-3-a), var(--piece-3-b)); }
.board-cell.piece-4 { background: linear-gradient(180deg, var(--piece-4-a), var(--piece-4-b)); }

.board.correct-pulse { animation: correctPulse 320ms ease both; }
.board.wrong-shake { animation: wrongShake 360ms ease both; }
@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.022); }
  100% { transform: scale(1); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-7px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}

.board-hint {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  padding: 7px 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: #1a1a3a;
  font-size: 12px;
  font-weight: 800;
  pointer-events: none;
  transition: opacity 220ms ease, transform 220ms ease;
}
.board-hint.hidden { opacity: 0; transform: translate(-50%, -42%) scale(0.96); }

.tray-wrap {
  width: var(--board-size);
}

.piece-tray {
  min-height: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.22);
  border: 2px solid rgba(0, 0, 0, 0.16);
  box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.06);
}

.piece {
  --mini-cell: 13px;
  display: grid;
  grid-template-columns: repeat(var(--cols), var(--mini-cell));
  grid-template-rows: repeat(var(--rows), var(--mini-cell));
  gap: 2px;
  padding: 6px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.10);
  border: 1px solid rgba(255, 255, 255, 0.16);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.22);
  cursor: grab;
  touch-action: none;
  transition: transform 160ms ease, opacity 160ms ease, filter 160ms ease;
}
.piece:active { cursor: grabbing; }
.piece.is-hidden { opacity: 0.22; filter: grayscale(1); transform: scale(0.92); pointer-events: none; }
.piece.is-placed { opacity: 0.28; filter: grayscale(1); transform: scale(0.9); pointer-events: none; }

.piece-cell {
  border-radius: 3px;
  background: transparent;
}
.piece-cell.on {
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.32),
    inset 0 -1.5px 0 rgba(0, 0, 0, 0.22);
}
.piece-1 .piece-cell.on { background: linear-gradient(180deg, var(--piece-1-a), var(--piece-1-b)); }
.piece-2 .piece-cell.on { background: linear-gradient(180deg, var(--piece-2-a), var(--piece-2-b)); }
.piece-3 .piece-cell.on { background: linear-gradient(180deg, var(--piece-3-a), var(--piece-3-b)); }
.piece-4 .piece-cell.on { background: linear-gradient(180deg, var(--piece-4-a), var(--piece-4-b)); }

.drag-clone {
  position: fixed;
  z-index: 100;
  pointer-events: none;
  transform: scale(1.55);
  filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.4));
}

.hand-cue {
  position: absolute;
  width: 46px;
  height: 46px;
  z-index: 4;
  pointer-events: none;
  opacity: 0.94;
  animation: handMove 1600ms ease-in-out infinite;
}
.hand-cue::before {
  content: "☝";
  position: absolute;
  left: 0; top: 0;
  font-size: 36px;
  color: #fff;
  transform: rotate(-18deg);
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
}
.hand-cue::after {
  content: "";
  position: absolute;
  left: 10px; top: 10px;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.7);
  animation: ripple 1600ms ease-in-out infinite;
}
@keyframes handMove {
  0%, 100% { transform: translate(0, 0); }
  55% { transform: translate(-50px, -48px); }
}
@keyframes ripple {
  0%, 30% { opacity: 0; transform: scale(0.5); }
  55% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.7); }
}
.hand-cue.hidden { display: none; }

.result-panel {
  position: absolute;
  inset: 0;
  z-index: 80;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(20, 4, 18, 0.62);
  backdrop-filter: blur(8px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 240ms ease, visibility 240ms ease;
}
.result-panel.is-visible { opacity: 1; visibility: visible; }

.result-card {
  position: relative;
  width: min(100%, 320px);
  padding: 24px 22px 18px;
  border-radius: 22px;
  text-align: center;
  background: #fff;
  color: #1a1a3a;
  box-shadow: 0 24px 50px rgba(0, 0, 0, 0.36);
}
.result-trophy {
  width: 64px; height: 64px;
  margin: 0 auto 10px;
  display: grid;
  place-items: center;
  border-radius: 16px;
  background: linear-gradient(180deg, var(--piece-2-a), var(--piece-2-b));
  box-shadow: 0 8px 18px rgba(255, 122, 26, 0.32);
}
.trophy-shape {
  width: 28px; height: 28px;
  background:
    linear-gradient(#fff, #fff) 0 0 / 60% 100% no-repeat,
    linear-gradient(#fff, #fff) 0 0 / 100% 60% no-repeat;
}
.result-card h2 {
  margin: 0 0 6px;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.03em;
}
.result-card p {
  margin: 0 auto 16px;
  max-width: 250px;
  color: #5a5a78;
  font-size: 13px;
  line-height: 1.5;
  word-break: keep-all;
}

.cta-button {
  width: 100%;
  height: 50px;
  border: 0;
  border-radius: 14px;
  color: #fff;
  font-size: 17px;
  font-weight: 900;
  background: linear-gradient(180deg, var(--install-hi), var(--install));
  box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18), 0 10px 22px rgba(44, 196, 106, 0.36);
  cursor: pointer;
}
.cta-button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0, 0, 0, 0.18); }

.replay-button {
  width: 100%;
  height: 36px;
  margin-top: 8px;
  border: 0;
  border-radius: 12px;
  color: #5a5a78;
  font-size: 12px;
  font-weight: 800;
  background: transparent;
  cursor: pointer;
}
.replay-button:hover { background: rgba(0, 0, 0, 0.04); }

@media (max-height: 620px) {
  :root { --board-size: min(70vw, 240px); }
  .top-bar { padding: 42px 16px 8px; }
  .logo-char { font-size: 26px; }
  .score-num { font-size: 24px; }
  .install-pill { height: 22px; padding: 0 12px; font-size: 11px; }
  .piece-tray { min-height: 60px; padding: 6px 8px; gap: 6px; }
  .piece { --mini-cell: 11px; padding: 5px; gap: 1.5px; }
}

</style>
</head>
<body>
  <main class="playable" id="playable" aria-label="블록 블라스트 플레이어블 광고">
    <button class="icon-btn close-btn" type="button" aria-label="닫기">×</button>
    <button class="icon-btn skip-btn" type="button" aria-label="건너뛰기">»</button>

    <header class="top-bar">
      <div class="logo" id="gameLogo" aria-label="게임 로고">
        <span class="logo-row">
          <span class="logo-char c1">B</span>
          <span class="logo-char c2">L</span>
          <span class="logo-char c3">O</span>
          <span class="logo-char c4">C</span>
          <span class="logo-char c5">K</span>
        </span>
        <span class="logo-row logo-row-2">
          <span class="logo-char c6">B</span>
          <span class="logo-char c7">L</span>
          <span class="logo-char c8">A</span>
          <span class="logo-char c9">S</span>
          <span class="logo-char c10">T</span>
        </span>
      </div>

      <div class="score-block">
        <div class="score-num" id="scoreNum">0</div>
        <button id="installPill" class="install-pill" type="button">Install</button>
      </div>
    </header>

    <section class="game-area" aria-label="블록 맞추기 게임 영역">
      <div class="board-wrap">
        <div id="board" class="board" aria-label="블록을 놓는 보드"></div>
        <div id="boardHint" class="board-hint">실루엣에 맞춰 놓기</div>
      </div>

      <div class="tray-wrap">
        <div id="tray" class="piece-tray" aria-label="드래그 가능한 블록 목록"></div>
      </div>
    </section>

    <section id="resultPanel" class="result-panel" aria-hidden="true">
      <div class="result-card">
        <div class="result-trophy" aria-hidden="true">
          <span class="trophy-shape"></span>
        </div>
        <h2 id="resultTitle">퍼즐 완성</h2>
        <p id="resultDesc">다음 스테이지부터는 진짜 시작.</p>
        <button id="ctaButton" class="cta-button" type="button">Install</button>
        <button id="replayButton" class="replay-button" type="button">다시 맞추기</button>
      </div>
    </section>
  </main>

  <script type="application/json" id="creative-config">{"landingUrl":"https://example.com/blockblast","gameTitle":["BLOCK","BLAST"],"installLabel":"Install","resultTitle":"퍼즐 완성","resultDesc":"다음 스테이지부터는 진짜 시작.","ctaText":"Install","replayText":"다시 맞추기","rows":8,"cols":8,"scorePerPiece":250,"snapToleranceCells":1.1,"pieces":[{"id":"p1","name":"일자 블록","className":"piece-1","target":{"row":0,"col":4},"shape":[[1,1,1,1]]},{"id":"p2","name":"네모 블록","className":"piece-2","target":{"row":1,"col":0},"shape":[[1,1],[1,1]]},{"id":"p3","name":"T 블록","className":"piece-3","target":{"row":4,"col":3},"shape":[[1,1,1],[0,1,0]]},{"id":"p4","name":"L 블록","className":"piece-4","target":{"row":5,"col":0},"shape":[[1,0],[1,0],[1,1]]}],"theme":null}</script>
  <script>
(function () {
  'use strict';

  var DEFAULT_CONFIG = {
    landingUrl: 'https://example.com',
    gameTitle: ['BLOCK', 'BLAST'],
    installLabel: 'Install',
    resultTitle: '퍼즐 완성',
    resultDesc: '다음 스테이지부터는 진짜 시작.',
    ctaText: 'Install',
    replayText: '다시 맞추기',
    rows: 8,
    cols: 8,
    scorePerPiece: 250,
    snapToleranceCells: 1.1,
    pieces: [
      {
        id: 'p1',
        name: '일자 블록',
        className: 'piece-1',
        target: { row: 0, col: 4 },
        shape: [[1, 1, 1, 1]]
      },
      {
        id: 'p2',
        name: '네모 블록',
        className: 'piece-2',
        target: { row: 1, col: 0 },
        shape: [[1, 1], [1, 1]]
      },
      {
        id: 'p3',
        name: 'T 블록',
        className: 'piece-3',
        target: { row: 4, col: 3 },
        shape: [[1, 1, 1], [0, 1, 0]]
      },
      {
        id: 'p4',
        name: 'L 블록',
        className: 'piece-4',
        target: { row: 5, col: 0 },
        shape: [[1, 0], [1, 0], [1, 1]]
      }
    ],
    theme: null
  };

  var CONFIG = loadCreativeConfig(DEFAULT_CONFIG);

  var state = {
    placed: {},
    started: false,
    drag: null,
    boardCells: [],
    score: 0,
    scoreDisplay: 0
  };

  var els = {};

  document.addEventListener('DOMContentLoaded', function () {
    applyTheme(CONFIG.theme);
    init();
  });

  function loadCreativeConfig(defaults) {
    try {
      var el = document.getElementById('creative-config');
      if (el && el.textContent && el.textContent.trim()) {
        return deepMerge(defaults, JSON.parse(el.textContent));
      }
    } catch (e) {
      if (window.console) console.warn('[creative-config] parse failed:', e);
    }
    return defaults;
  }

  function deepMerge(a, b) {
    if (Array.isArray(b)) return b.slice();
    if (b === null || typeof b !== 'object') return b;
    var out = (a && typeof a === 'object' && !Array.isArray(a)) ? Object.assign({}, a) : {};
    Object.keys(b).forEach(function (k) {
      var bv = b[k];
      if (bv !== null && typeof bv === 'object' && !Array.isArray(bv)) {
        out[k] = deepMerge(out[k] || {}, bv);
      } else if (Array.isArray(bv)) {
        out[k] = bv.slice();
      } else {
        out[k] = bv;
      }
    });
    return out;
  }

  function applyTheme(theme) {
    if (!theme) return;
    var root = document.documentElement;
    Object.keys(theme).forEach(function (k) {
      root.style.setProperty('--' + k, theme[k]);
    });
  }

  function init() {
    els.playable = document.getElementById('playable');
    els.gameLogo = document.getElementById('gameLogo');
    els.scoreNum = document.getElementById('scoreNum');
    els.installPill = document.getElementById('installPill');
    els.board = document.getElementById('board');
    els.tray = document.getElementById('tray');
    els.boardHint = document.getElementById('boardHint');
    els.resultPanel = document.getElementById('resultPanel');
    els.resultTitle = document.getElementById('resultTitle');
    els.resultDesc = document.getElementById('resultDesc');
    els.ctaButton = document.getElementById('ctaButton');
    els.replayButton = document.getElementById('replayButton');

    renderLogo();
    els.installPill.textContent = CONFIG.installLabel;
    els.resultTitle.textContent = CONFIG.resultTitle;
    els.resultDesc.textContent = CONFIG.resultDesc;
    els.ctaButton.textContent = CONFIG.ctaText;
    els.replayButton.textContent = CONFIG.replayText;

    els.board.style.gridTemplateColumns = 'repeat(' + CONFIG.cols + ', 1fr)';
    els.board.style.gridTemplateRows = 'repeat(' + CONFIG.rows + ', 1fr)';

    renderBoard();
    renderTray();

    els.ctaButton.addEventListener('click', function () {
      track('cta_click', { source: 'result', placed: getPlacedCount(), score: state.score });
      openLanding();
    });
    els.installPill.addEventListener('click', function () {
      track('cta_click', { source: 'install_pill', placed: getPlacedCount(), score: state.score });
      openLanding();
    });
    els.replayButton.addEventListener('click', resetGame);

    document.querySelectorAll('.close-btn, .skip-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        track(btn.classList.contains('skip-btn') ? 'skip_click' : 'close_click');
        openLanding();
      });
    });

    addHandCue();
    track('creative_view');
  }

  function renderLogo() {
    if (!CONFIG.gameTitle || !els.gameLogo) return;
    var rows = Array.isArray(CONFIG.gameTitle[0]) ? CONFIG.gameTitle : [CONFIG.gameTitle];
    els.gameLogo.innerHTML = '';
    var counter = 1;
    rows.forEach(function (row, ri) {
      var rowEl = document.createElement('span');
      rowEl.className = 'logo-row' + (ri > 0 ? ' logo-row-2' : '');
      var text = typeof row === 'string' ? row : (Array.isArray(row) ? row.join('') : '');
      text.split('').forEach(function (ch) {
        var s = document.createElement('span');
        s.className = 'logo-char c' + counter;
        s.textContent = ch;
        rowEl.appendChild(s);
        counter++;
      });
      els.gameLogo.appendChild(rowEl);
    });
  }

  function renderBoard() {
    els.board.innerHTML = '';
    state.boardCells = [];
    for (var r = 0; r < CONFIG.rows; r++) {
      for (var c = 0; c < CONFIG.cols; c++) {
        var cell = document.createElement('div');
        cell.className = 'board-cell';
        cell.dataset.row = String(r);
        cell.dataset.col = String(c);
        els.board.appendChild(cell);
        state.boardCells.push(cell);
      }
    }
    CONFIG.pieces.forEach(function (piece) {
      forEachShapeCell(piece, function (row, col) {
        var cell = getCell(piece.target.row + row, piece.target.col + col);
        if (cell) {
          cell.classList.add('target');
          cell.dataset.targetPiece = piece.id;
        }
      });
    });
  }

  function renderTray() {
    els.tray.innerHTML = '';
    CONFIG.pieces.forEach(function (piece) {
      els.tray.appendChild(createPieceElement(piece));
    });
  }

  function createPieceElement(piece) {
    var rows = piece.shape.length;
    var cols = piece.shape[0].length;
    var pieceEl = document.createElement('div');
    pieceEl.className = 'piece ' + piece.className;
    pieceEl.dataset.pieceId = piece.id;
    pieceEl.setAttribute('role', 'button');
    pieceEl.setAttribute('aria-label', piece.name + ' 드래그');
    pieceEl.style.setProperty('--rows', String(rows));
    pieceEl.style.setProperty('--cols', String(cols));
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var cell = document.createElement('div');
        cell.className = 'piece-cell' + (piece.shape[r][c] ? ' on' : '');
        pieceEl.appendChild(cell);
      }
    }
    pieceEl.addEventListener('pointerdown', onPointerDown);
    return pieceEl;
  }

  function addHandCue() {
    var hand = document.createElement('div');
    hand.className = 'hand-cue';
    hand.setAttribute('aria-hidden', 'true');
    els.playable.appendChild(hand);
    els.handCue = hand;
    positionHandCue();
  }

  function positionHandCue() {
    if (!els.handCue || !els.tray) return;
    var firstPiece = els.tray.querySelector('.piece');
    if (!firstPiece) return;
    var pieceRect = firstPiece.getBoundingClientRect();
    var playableRect = els.playable.getBoundingClientRect();
    els.handCue.style.left = (pieceRect.right - playableRect.left - 18) + 'px';
    els.handCue.style.top = (pieceRect.bottom - playableRect.top - 22) + 'px';
  }

  function onPointerDown(e) {
    var source = e.currentTarget;
    var piece = getPiece(source.dataset.pieceId);
    if (!piece || state.placed[piece.id]) return;

    if (!state.started) {
      state.started = true;
      track('first_interaction', { type: 'drag_start', piece: piece.id });
    }
    track('drag_start', { piece: piece.id });

    if (els.handCue) els.handCue.classList.add('hidden');
    if (els.boardHint) els.boardHint.classList.add('hidden');

    var rect = source.getBoundingClientRect();
    var clone = source.cloneNode(true);
    clone.classList.add('drag-clone');
    clone.style.left = rect.left + 'px';
    clone.style.top = rect.top + 'px';
    clone.style.width = rect.width + 'px';
    clone.style.height = rect.height + 'px';
    document.body.appendChild(clone);

    source.classList.add('is-hidden');

    state.drag = {
      piece: piece,
      source: source,
      clone: clone,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      width: rect.width,
      height: rect.height
    };

    try { source.setPointerCapture(e.pointerId); } catch (err) {}
    moveClone(e.clientX, e.clientY);

    window.addEventListener('pointermove', onPointerMove, { passive: false });
    window.addEventListener('pointerup', onPointerUp, { passive: false });
    window.addEventListener('pointercancel', onPointerCancel, { passive: false });
  }

  function onPointerMove(e) {
    if (!state.drag) return;
    e.preventDefault();
    moveClone(e.clientX, e.clientY);
    previewTarget(e.clientX, e.clientY);
  }

  function onPointerUp(e) {
    if (!state.drag) return;
    e.preventDefault();
    clearHover();
    var dropped = tryDrop(e.clientX, e.clientY);
    if (!dropped) rejectDrop();
    cleanupDrag();
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
    window.removeEventListener('pointercancel', onPointerCancel);
  }

  function onPointerCancel() {
    if (!state.drag) return;
    clearHover();
    rejectDrop();
    cleanupDrag();
  }

  function moveClone(clientX, clientY) {
    var d = state.drag;
    d.clone.style.left = (clientX - d.offsetX) + 'px';
    d.clone.style.top = (clientY - d.offsetY) + 'px';
  }

  function previewTarget(clientX, clientY) {
    clearHover();
    var d = state.drag;
    var match = getDropMatch(d.piece, clientX, clientY);
    if (!match) return;
    forEachShapeCell(d.piece, function (r, c) {
      var cell = getCell(d.piece.target.row + r, d.piece.target.col + c);
      if (cell) cell.classList.add('hover');
    });
  }

  function getDropMatch(piece, clientX, clientY) {
    var boardRect = els.board.getBoundingClientRect();
    var cellOuter = boardRect.width / CONFIG.cols;
    var targetLeft = boardRect.left + piece.target.col * cellOuter;
    var targetTop = boardRect.top + piece.target.row * cellOuter;
    var topLeftX = clientX - state.drag.offsetX;
    var topLeftY = clientY - state.drag.offsetY;
    var distance = Math.hypot(topLeftX - targetLeft, topLeftY - targetTop);
    var withinDistance = distance <= cellOuter * CONFIG.snapToleranceCells;
    var targetBox = getPieceTargetBox(piece, boardRect, cellOuter);
    var insideTargetBox = clientX >= targetBox.left - cellOuter * 0.5 &&
      clientX <= targetBox.right + cellOuter * 0.5 &&
      clientY >= targetBox.top - cellOuter * 0.5 &&
      clientY <= targetBox.bottom + cellOuter * 0.5;
    return withinDistance || insideTargetBox;
  }

  function getPieceTargetBox(piece, boardRect, cellOuter) {
    var minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    forEachShapeCell(piece, function (r, c) {
      minR = Math.min(minR, r); maxR = Math.max(maxR, r);
      minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    });
    return {
      left: boardRect.left + (piece.target.col + minC) * cellOuter,
      top: boardRect.top + (piece.target.row + minR) * cellOuter,
      right: boardRect.left + (piece.target.col + maxC + 1) * cellOuter,
      bottom: boardRect.top + (piece.target.row + maxR + 1) * cellOuter
    };
  }

  function tryDrop(clientX, clientY) {
    var piece = state.drag.piece;
    var ok = getDropMatch(piece, clientX, clientY);
    if (!ok) return false;
    placePiece(piece);
    state.drag.source.classList.remove('is-hidden');
    state.drag.source.classList.add('is-placed');
    state.placed[piece.id] = true;
    addScore(CONFIG.scorePerPiece);
    track('piece_placed', { piece: piece.id, count: getPlacedCount(), score: state.score });
    pulseBoard('correct-pulse');
    if (isComplete()) setTimeout(showResult, 360);
    return true;
  }

  function placePiece(piece) {
    forEachShapeCell(piece, function (r, c) {
      var cell = getCell(piece.target.row + r, piece.target.col + c);
      if (cell) {
        cell.classList.remove('target', 'hover');
        cell.classList.add('filled', piece.className);
      }
    });
  }

  function rejectDrop() {
    if (!state.drag) return;
    var source = state.drag.source;
    source.classList.remove('is-hidden');
    pulseBoard('wrong-shake');
    track('wrong_drop', { piece: state.drag.piece.id });
  }

  function cleanupDrag() {
    if (!state.drag) return;
    if (state.drag.clone && state.drag.clone.parentNode) {
      state.drag.clone.parentNode.removeChild(state.drag.clone);
    }
    state.drag = null;
  }

  function resetGame() {
    state.placed = {};
    state.started = false;
    state.score = 0;
    state.scoreDisplay = 0;
    els.scoreNum.textContent = '0';
    els.resultPanel.classList.remove('is-visible');
    els.resultPanel.setAttribute('aria-hidden', 'true');
    renderBoard();
    renderTray();
    if (els.boardHint) els.boardHint.classList.remove('hidden');
    if (els.handCue) {
      els.handCue.classList.remove('hidden');
      positionHandCue();
    }
    track('replay_click');
  }

  function showResult() {
    els.resultPanel.classList.add('is-visible');
    els.resultPanel.setAttribute('aria-hidden', 'false');
    track('complete', { placed: getPlacedCount(), score: state.score });
  }

  function addScore(amount) {
    state.score += amount;
    animateScore(state.scoreDisplay, state.score, 540);
    state.scoreDisplay = state.score;
  }

  function animateScore(from, to, duration) {
    var start = performance.now ? performance.now() : Date.now();
    function step(now) {
      var t = Math.min(1, ((now || Date.now()) - start) / duration);
      var eased = 1 - Math.pow(1 - t, 3);
      var v = Math.round(from + (to - from) * eased);
      els.scoreNum.textContent = String(v);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function getPlacedCount() {
    return Object.keys(state.placed).length;
  }

  function isComplete() {
    return getPlacedCount() === CONFIG.pieces.length;
  }

  function getPiece(id) {
    for (var i = 0; i < CONFIG.pieces.length; i++) {
      if (CONFIG.pieces[i].id === id) return CONFIG.pieces[i];
    }
    return null;
  }

  function getCell(row, col) {
    if (row < 0 || col < 0 || row >= CONFIG.rows || col >= CONFIG.cols) return null;
    return state.boardCells[row * CONFIG.cols + col];
  }

  function forEachShapeCell(piece, fn) {
    for (var r = 0; r < piece.shape.length; r++) {
      for (var c = 0; c < piece.shape[r].length; c++) {
        if (piece.shape[r][c]) fn(r, c);
      }
    }
  }

  function clearHover() {
    state.boardCells.forEach(function (cell) { cell.classList.remove('hover'); });
  }

  function pulseBoard(className) {
    els.board.classList.remove('correct-pulse', 'wrong-shake');
    void els.board.offsetWidth;
    els.board.classList.add(className);
    window.setTimeout(function () { els.board.classList.remove(className); }, 420);
  }

  function getLandingUrl() {
    var params = new URLSearchParams(window.location.search);
    return params.get('clickTag') || params.get('clickTAG') || params.get('landing') || window.clickTag || window.clickTAG || CONFIG.landingUrl;
  }

  function openLanding() {
    var url = getLandingUrl();
    if (!url) return;
    try {
      if (window.mraid && typeof window.mraid.open === 'function') {
        window.mraid.open(url);
      } else {
        window.open(url, '_blank');
      }
    } catch (e) {
      window.location.href = url;
    }
  }

  function track(eventName, payload) {
    var detail = payload || {};
    window.dispatchEvent(new CustomEvent('magentPlayableEvent', {
      detail: { name: eventName, payload: detail, ts: Date.now() }
    }));
    if (window.MAGENT_DEBUG) console.log('[MagentPlayable]', eventName, detail);
  }

  window.addEventListener('resize', positionHandCue);
})();

</script>
</body>
</html>
